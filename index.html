<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carroll's Stanley Cup Playoffs Bracket Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ice: #e8f4f8;
    --ice2: #d0e8f0;
    --dark: #0a0f1e;
    --dark2: #111827;
    --dark3: #1e2a3a;
    --gold: #c9a84c;
    --gold2: #f0c96e;
    --silver: #8a9ab0;
    --text: #e2eaf4;
    --text2: #8a9ab0;
    --red: #e24b4a;
    --green: #3cb371;
    --border: rgba(201,168,76,0.2);
    --border2: rgba(255,255,255,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(30,60,100,0.15) 0%, transparent 50%);
  }
  .app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* Header */
  .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--gold); line-height: 1; }
  .header .sub { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--text2); margin-top: 4px; }
  .header .user-row { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 12px; }

  /* Cards */
  .card {
    background: var(--dark2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card.gold-border { border-color: var(--border); }

  /* Inputs */
  input, select {
    width: 100%;
    padding: 10px 12px;
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--gold); }
  input::placeholder { color: var(--text2); }
  select option { background: var(--dark2); }

  /* Buttons */
  button {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text);
  }
  button:hover { background: rgba(255,255,255,0.07); }
  .btn-gold { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 600; }
  .btn-gold:hover { background: var(--gold2); border-color: var(--gold2); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-danger { background: rgba(226,75,74,0.15); border-color: rgba(226,75,74,0.4); color: var(--red); }
  .btn-danger:hover { background: rgba(226,75,74,0.25); }
  .btn-success { background: rgba(60,179,113,0.15); border-color: rgba(60,179,113,0.4); color: var(--green); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--dark2); padding: 4px; border-radius: 10px; }
  .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text2); border: none; background: transparent; transition: all 0.15s; font-weight: 500; }
  .tab.active { background: var(--dark3); color: var(--gold); border: 1px solid var(--border); }

  .entry-tab { padding: 6px 14px; font-size: 13px; font-family: 'Inter', sans-serif; border: 1px solid var(--border2); border-radius: 8px; background: var(--dark2); color: var(--text2); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .entry-tab.active { background: var(--dark3); color: var(--gold); border-color: var(--border); }
  .entry-tab:hover { color: var(--text); }

  /* Bracket */
  .bracket-wrap { width: 100%; overflow-x: auto; padding-bottom: 1rem; }
  .bracket-headers { display: grid; grid-template-columns: 160px 130px 120px 110px 120px 130px 160px; min-width: 930px; margin-bottom: 6px; }
  .bracket-header { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 1px; color: var(--gold2); padding: 5px 4px; border-bottom: 1px solid var(--border); }
  .bracket-header .pts-tag { display: block; font-family: 'Inter', sans-serif; font-size: 10px; color: var(--text2); letter-spacing: 0; }
  .bracket-grid { display: grid; grid-template-columns: 160px 130px 120px 110px 120px 130px 160px; gap: 0; min-width: 930px; align-items: center; }
  .bracket-col { display: flex; flex-direction: column; padding: 0 3px; }
  .bracket-col.r1 { gap: 8px; }
  .bracket-col.r2 { gap: 0; justify-content: space-around; height: 100%; }
  .bracket-col.r3 { justify-content: space-around; height: 100%; }
  .series-slot { background: var(--dark2); border: 1px solid var(--border2); border-radius: 7px; padding: 7px 8px; transition: border-color 0.15s; }
  .series-slot:hover { border-color: rgba(201,168,76,0.3); }
  .series-slot.final-slot { border-color: var(--border); background: rgba(201,168,76,0.06); padding: 10px; }
  .slot-teams { font-size: 10px; color: var(--text2); margin-bottom: 5px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-teams strong { color: var(--text); font-weight: 500; }
  .series-slot select { margin: 0 0 4px 0; font-size: 10px; padding: 4px 5px; width: 100%; }
  .series-slot select:last-of-type { margin-bottom: 0; }
  .locked-pick { font-size: 11px; font-weight: 600; color: var(--text); }
  .locked-games { font-size: 10px; color: var(--text2); }
  .locked-result { font-size: 10px; margin-top: 3px; padding-top: 3px; border-top: 1px solid var(--border2); }
  .locked-result.correct { color: var(--green); }
  .locked-result.wrong { color: var(--red); }
  .cup-center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 4px; }
  .cup-icon { font-size: 24px; margin-bottom: 4px; }
  .cup-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--gold); }
  .cup-pts { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .conf-tag { font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--text2); text-align: center; margin-bottom: 4px; }
  .status-banner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; }
  .status-banner.open { background: rgba(60,179,113,0.1); border: 1px solid rgba(60,179,113,0.25); color: var(--green); }
  .status-banner.locked { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.25); color: var(--red); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .badge-open { background: rgba(60,179,113,0.15); color: var(--green); border: 1px solid rgba(60,179,113,0.3); }
  .badge-locked { background: rgba(226,75,74,0.15); color: var(--red); border: 1px solid rgba(226,75,74,0.3); }

  /* Mobile bracket — vertical stacked layout (hidden by default) */
  .mobile-bracket { display: none; }
  .mobile-round { background: var(--dark2); border: 1px solid var(--border2); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .mobile-round-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; user-select: none; }
  .mobile-round-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--gold2); }
  .mobile-round-meta { font-size: 12px; color: var(--text2); }
  .mobile-round-chevron { color: var(--text2); font-size: 12px; transition: transform 0.2s; }
  .mobile-round-chevron.open { transform: rotate(180deg); }
  .mobile-round-body { padding: 0 12px 12px; display: none; }
  .mobile-round-body.open { display: block; }
  .mobile-slot { background: var(--dark3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .mobile-slot:last-child { margin-bottom: 0; }
  .mobile-slot-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
  .mobile-slot-teams { font-size: 13px; color: var(--text); font-weight: 500; margin-bottom: 8px; }
  .mobile-slot select { font-size: 14px; padding: 8px 10px; margin-bottom: 8px; width: 100%; }
  .mobile-slot select:last-of-type { margin-bottom: 0; }
  .mobile-slot .locked-pick { font-size: 14px; }
  .mobile-slot .locked-games { font-size: 13px; }
  .mobile-slot .locked-result { font-size: 13px; padding-top: 6px; margin-top: 6px; }
  .mobile-conf-label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--text2); margin: 10px 0 6px; }

  /* Scroll hint */
  .scroll-hint { display: none; font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 6px; letter-spacing: 1px; }

  @media (max-width: 700px) {
    .app { padding: 1rem .5rem; }
    .scroll-hint { display: block; }
    .bracket-wrap { -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; padding-bottom: .75rem; }
    .bracket-headers { min-width: 700px; grid-template-columns: 120px 100px 90px 80px 90px 100px 120px; }
    .bracket-grid { min-width: 700px; grid-template-columns: 120px 100px 90px 80px 90px 100px 120px; }
    .series-slot { padding: 5px 6px; }
    .slot-teams { font-size: 9px; white-space: normal; line-height: 1.3; }
    .series-slot select { font-size: 9px; padding: 3px 4px; }
    .locked-pick { font-size: 10px; }
    .locked-games { font-size: 9px; }
    .locked-result { font-size: 9px; }
    .cup-icon { font-size: 18px; }
    .cup-label { font-size: 11px; }
    .cup-pts { font-size: 9px; }
    .bracket-header { font-size: 10px; padding: 4px 2px; }
    .bracket-header .pts-tag { font-size: 9px; }
  }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border2); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 24px; min-width: 36px; color: var(--text2); }
  .lb-rank.top { color: var(--gold); }
  .lb-name { flex: 1; font-weight: 500; }
  .lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold2); }
  .lb-tb { font-size: 11px; color: var(--text2); }

  /* Error/success */
  .msg-error { color: var(--red); font-size: 13px; margin-bottom: 8px; }
  .msg-success { color: var(--green); font-size: 13px; margin-bottom: 8px; }
  .divider { border: none; border-top: 1px solid var(--border2); margin: 1rem 0; }
  .login-wrap { max-width: 360px; margin: 3rem auto; }
  .login-wrap h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--gold); margin-bottom: 1.5rem; }
  .tb-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-top: 1rem; }
  .tb-box label { font-size: 13px; color: var(--gold2); font-weight: 600; display: block; margin-bottom: 6px; }
  .tb-box .tb-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .tb-box input { margin: 0; width: 160px; }
  .admin-series { display: grid; grid-template-columns: 1fr 100px 80px; gap: 8px; align-items: center; padding: 8px 12px; background: var(--dark3); border-radius: 8px; margin-bottom: 6px; }
  .admin-series select { margin: 0; font-size: 12px; padding: 6px 8px; }
  .state-buttons { display: flex; gap: 6px; }
  .loader { text-align: center; color: var(--text2); padding: 2rem; }
  h3 { font-size: 15px; font-weight: 600; margin-bottom: .75rem; }
  .section-gap { margin-bottom: 1.5rem; }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }

</style>
</head>
<body>
<div class="app" id="app"><div class="loader">Loading...</div></div>
<script>
const SUPABASE_URL = 'https://gggzyzoyzbrpipiejhir.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZ3p5em95emJycGlwaWVqaGlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODE3NzEsImV4cCI6MjA5MTc1Nzc3MX0.RV-DzvvxyLXuu3h6OSa9552siHBcW6avGs2wwlpbzlY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Bracket structure ──────────────────────────────────────────────
// Round 1: 8 known matchups. Rounds 2-4: players predict who advances.
const R1_MATCHUPS = [
  // East - Atlantic
  { id: 'e1', conf: 'East', seed_a: 1, a: 'Buffalo Sabres',        seed_b: 8, b: 'Boston Bruins' },
  { id: 'e2', conf: 'East', seed_a: 2, a: 'Montreal Canadiens',    seed_b: 7, b: 'Tampa Bay Lightning' },
  // East - Metro
  { id: 'e3', conf: 'East', seed_a: 1, a: 'Carolina Hurricanes',   seed_b: 8, b: 'Ottawa Senators' },
  { id: 'e4', conf: 'East', seed_a: 2, a: 'Pittsburgh Penguins',   seed_b: 7, b: 'Philadelphia Flyers' },
  // West - Central
  { id: 'w1', conf: 'West', seed_a: 1, a: 'Colorado Avalanche',    seed_b: 8, b: 'Los Angeles Kings' },
  { id: 'w2', conf: 'West', seed_a: 2, a: 'Dallas Stars',          seed_b: 7, b: 'Minnesota Wild' },
  // West - Pacific
  { id: 'w3', conf: 'West', seed_a: 1, a: 'Vegas Golden Knights',  seed_b: 8, b: 'Utah Mammoth' },
  { id: 'w4', conf: 'West', seed_a: 2, a: 'Edmonton Oilers',       seed_b: 7, b: 'Anaheim Ducks' },
];

// All NHL playoff teams (for rounds 2+)
const ALL_TEAMS = [...new Set(R1_MATCHUPS.flatMap(m => [m.a, m.b]))].sort();

const ROUNDS = [
  { id: 'r1', name: 'Round 1',           pts_team: 1, pts_games: 1, series_count: 8 },
  { id: 'r2', name: 'Round 2',           pts_team: 2, pts_games: 1, series_count: 4 },
  { id: 'r3', name: 'Conference Finals', pts_team: 3, pts_games: 1, series_count: 2 },
  { id: 'r4', name: 'Stanley Cup Final', pts_team: 4, pts_games: 1, series_count: 1 },
];
const GAMES = ['4','5','6','7'];

// ── App state ──────────────────────────────────────────────────────
let currentUser = null;
let isAdmin = false;
let view = 'picks';
let poolSettings = null;
let allEntries = [];        // [{ id, user_id, name, created_at }]
let allPicks = {};          // { entry_id: { round_id: { series_id: {winner,games} } } }
let results = {};           // { round_id: { series_id: {winner,games} } }
let profiles = {};          // { user_id: { username, is_admin } }
let tiebreakers = {};       // { entry_id: number }
let loginError = '';
let regMode = false;
let saveMsg = '';
let activeEntryId = null;   // which entry is currently being edited

// ── Boot ───────────────────────────────────────────────────────────
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadUser(session.user);
  render();
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') { await loadUser(session.user); render(); }
    if (event === 'SIGNED_OUT') { currentUser = null; isAdmin = false; allEntries = []; activeEntryId = null; render(); }
  });
}

async function loadUser(user) {
  currentUser = user;
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
  isAdmin = data?.is_admin || false;
  await refreshData();
  // Set active entry to first own entry
  const myEntries = allEntries.filter(e => e.user_id === currentUser.id);
  if (myEntries.length > 0 && !activeEntryId) activeEntryId = myEntries[0].id;
}

async function refreshData() {
  const [settingsRes, entriesRes, picksRes, resultsRes, profilesRes, tbRes] = await Promise.all([
    sb.from('pool_settings').select('*').single(),
    sb.from('entries').select('*').order('created_at'),
    sb.from('picks').select('*'),
    sb.from('results').select('*'),
    sb.from('profiles').select('*'),
    sb.from('tiebreakers').select('*'),
  ]);
  poolSettings = settingsRes.data || { r1_state:'open', r2_state:'locked', r3_state:'locked', r4_state:'locked' };
  allEntries = entriesRes.data || [];
  // Build picks map keyed by entry_id
  allPicks = {};
  (picksRes.data || []).forEach(p => {
    if (!p.entry_id) return;
    if (!allPicks[p.entry_id]) allPicks[p.entry_id] = {};
    if (!allPicks[p.entry_id][p.round_id]) allPicks[p.entry_id][p.round_id] = {};
    allPicks[p.entry_id][p.round_id][p.series_id] = { winner: p.winner, games: p.games };
  });
  results = {};
  (resultsRes.data || []).forEach(r => {
    if (!results[r.round_id]) results[r.round_id] = {};
    results[r.round_id][r.series_id] = { winner: r.winner, games: r.games };
  });
  profiles = {};
  (profilesRes.data || []).forEach(p => { profiles[p.id] = p; });
  tiebreakers = {};
  (tbRes.data || []).forEach(t => {
    if (t.entry_id) tiebreakers[t.entry_id] = t.goals;
  });
}

async function createEntry(name) {
  const { data, error } = await sb.from('entries').insert({ user_id: currentUser.id, name }).select().single();
  if (error || !data) return null;
  await refreshData();
  activeEntryId = data.id;
  return data;
}

async function deleteEntry(entryId) {
  await sb.from('picks').delete().eq('entry_id', entryId);
  await sb.from('tiebreakers').delete().eq('entry_id', entryId);
  await sb.from('entries').delete().eq('id', entryId);
  await refreshData();
  const myEntries = allEntries.filter(e => e.user_id === currentUser.id);
  activeEntryId = myEntries.length > 0 ? myEntries[0].id : null;
}

function getState(rid) { return poolSettings?.[rid+'_state'] || 'locked'; }
function myPick(rid, sid) { return allPicks[activeEntryId]?.[rid]?.[sid] || {}; }
function myEntries() { return allEntries.filter(e => e.user_id === currentUser?.id); }


// ── Scoring ────────────────────────────────────────────────────────
function computeScores() {
  // Returns { entry_id: pts }
  const scores = {};
  const globalState = getState('r1');
  if (globalState === 'open') {
    allEntries.forEach(e => { scores[e.id] = 0; });
    return scores;
  }
  allEntries.forEach(entry => {
    let total = 0;
    ROUNDS.forEach(r => {
      const rPicks = allPicks[entry.id]?.[r.id] || {};
      const rResults = results[r.id] || {};
      Object.entries(rPicks).forEach(([sid, pick]) => {
        const res = rResults[sid];
        if (!res || !res.winner) return;
        if (pick.winner === res.winner) {
          total += r.pts_team;
          if (pick.games === res.games) total += r.pts_games;
        }
      });
    });
    scores[entry.id] = total;
  });
  return scores;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('app');
  if (!currentUser) { el.innerHTML = renderLogin(); attachLogin(); return; }
  el.innerHTML = renderShell();
  attachMain();
}

function renderShell() {
  const username = profiles[currentUser.id]?.username || currentUser.email;
  const locked = getState('r1') !== 'open';
  const tabs = [
    { id: 'picks', label: 'My Bracket' },
    { id: 'leaderboard', label: 'Leaderboard' },
    { id: 'brackets', label: 'All Brackets' },
    { id: 'rules', label: 'Rules' },
  ];
  if (isAdmin) tabs.push({ id: 'admin', label: 'Admin' });
  const tabHtml = tabs.map(t =>
    `<button class="tab${view===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');
  let content = '';
  if (view === 'picks') content = renderPicks();
  else if (view === 'leaderboard') content = renderLeaderboard();
  else if (view === 'brackets') content = renderAllBrackets();
  else if (view === 'rules') content = renderRules();
  else if (view === 'admin') content = renderAdmin();
  return `
    <div class="header">
      <h1>Carroll's Bracket Pool</h1>
      <div class="sub">2026 Stanley Cup Playoffs</div>
      <div class="user-row">
        <span style="font-size:13px;color:var(--text2)">${username}</span>
        <button class="btn-sm" id="logout_btn">Sign out</button>
      </div>
    </div>
    <div class="tabs">${tabHtml}</div>
    ${saveMsg ? `<div class="msg-success" style="text-align:center;margin-bottom:.75rem">${saveMsg}</div>` : ''}
    ${content}`;
}

function renderLogin() {
  return `
    <div class="header"><h1>Carroll's Bracket Pool</h1><div class="sub">2026 Stanley Cup Playoffs</div></div>
    <div class="login-wrap">
      <h2>${regMode ? 'Create Account' : 'Sign In'}</h2>
      ${loginError ? `<div class="msg-error">${loginError}</div>` : ''}
      <label>Username</label>
      <input id="l_user" placeholder="yourname" autocomplete="username" />
      <label>Password</label>
      <input id="l_pass" type="password" placeholder="••••••••" autocomplete="${regMode?'new-password':'current-password'}" />
      ${regMode ? `<label>Confirm password</label><input id="l_pass2" type="password" placeholder="••••••••" autocomplete="new-password" />` : ''}
      <button class="btn-gold" id="l_submit" style="width:100%;margin-top:4px${regMode ? ';opacity:0.5;pointer-events:none' : ''}" ${regMode ? 'disabled' : ''}>${regMode ? 'Join the Pool' : 'Sign In'}</button>

// Get the live value of a winner select — reads DOM if open, falls back to saved pick
function getLiveWinner(rid, sid) {
  const el = document.getElementById(`pw_${rid}_${sid}`);
  if (el) return el.value;
  return myPick(rid, sid).winner || '';
}

function slotHtml(rid, sid, availTeams, labelA, labelB, r, locked) {
  const pick = myPick(rid, sid);
  const res = results[rid]?.[sid];

  if (locked) {
    let html = '';
    if (pick.winner) {
      html = `<div class="locked-pick">${pick.winner}</div><div class="locked-games">in ${pick.games||'?'} games</div>`;
    } else {
      html = `<div class="locked-pick" style="color:var(--text2)">No pick</div>`;
    }
    if (res?.winner) {
      const correct = pick.winner === res.winner;
      const gRight = correct && pick.games === res.games;
      const pts = (correct ? r.pts_team : 0) + (gRight ? r.pts_games : 0);
      html += `<div class="locked-result ${correct?'correct':'wrong'}">${res.winner} in ${res.games} · ${pts>0?'+'+pts+'pt':'0pt'}</div>`;
    }
    return `<div class="series-slot">${html}</div>`;
  }

  // Open — editable
  let label = '';
  let opts = '';
  if (availTeams && availTeams.length > 0) {
    label = availTeams.length === 2
      ? `<div class="slot-teams"><strong>${availTeams[0]}</strong> vs <strong>${availTeams[1]}</strong></div>`
      : `<div class="slot-teams" style="color:var(--text2);font-style:italic">Pick R1 winners first</div>`;
    opts = availTeams.length > 0
      ? availTeams.map(t=>`<option value="${t}"${pick.winner===t?' selected':''}>${t}</option>`).join('')
      : '';
  } else if (labelA && labelB) {
    label = `<div class="slot-teams"><strong>${labelA}</strong> vs <strong>${labelB}</strong></div>`;
    opts = `<option value="${labelA}"${pick.winner===labelA?' selected':''}>${labelA}</option>
            <option value="${labelB}"${pick.winner===labelB?' selected':''}>${labelB}</option>`;
  }

  const disabled = (availTeams && availTeams.length === 0) ? 'disabled style="opacity:0.4"' : '';

  return `<div class="series-slot" id="slot_${rid}_${sid}">
    ${label}
    <select id="pw_${rid}_${sid}" ${disabled} onchange="refreshBracket()">
      <option value="">Winner</option>
      ${opts}
    </select>
    <select id="pg_${rid}_${sid}" ${disabled}>
      <option value="">Gms</option>
      ${GAMES.map(g=>`<option value="${g}"${pick.games===g?' selected':''}>${g}</option>`).join('')}
    </select>
  </div>`;
}

function getCascadedTeams() {
  // Each R2 slot needs the two R1 winners from its pair.
  // A team is available as soon as its R1 pick is made — you don't need to finish all of R1.
  const r1 = (sid) => getLiveWinner('r1', sid);
  const r2 = (sid) => getLiveWinner('r2', sid);
  const r3 = (sid) => getLiveWinner('r3', sid);

  // West R2: s1 = winner(w1) vs winner(w2), s2 = winner(w3) vs winner(w4)
  const wr2s1 = [r1('w1'), r1('w2')].filter(Boolean);
  const wr2s2 = [r1('w3'), r1('w4')].filter(Boolean);
  // East R2: s3 = winner(e1) vs winner(e2), s4 = winner(e3) vs winner(e4)
  const er2s3 = [r1('e1'), r1('e2')].filter(Boolean);
  const er2s4 = [r1('e3'), r1('e4')].filter(Boolean);

  // West Conf Final: winner(r2_s1) vs winner(r2_s2)
  const wcf = [r2('r2_s1'), r2('r2_s2')].filter(Boolean);
  // East Conf Final: winner(r2_s3) vs winner(r2_s4)
  const ecf = [r2('r2_s3'), r2('r2_s4')].filter(Boolean);

  // Cup Final: winner(r3_s1=WCF) vs winner(r3_s2=ECF)
  const final = [r3('r3_s1'), r3('r3_s2')].filter(Boolean);

  return { wr2s1, wr2s2, er2s3, er2s4, wcf, ecf, final };
}

function refreshBracket() {
  const t = getCascadedTeams();

  function updateSlot(rid, sid, teams) {
    const sel = document.getElementById(`pw_${rid}_${sid}`);
    if (!sel) return;
    const cur = sel.value;
    const disabled = teams.length === 0;
    sel.disabled = disabled;
    sel.style.opacity = disabled ? '0.4' : '1';
    const gsel = document.getElementById(`pg_${rid}_${sid}`);
    if (gsel) { gsel.disabled = disabled; gsel.style.opacity = disabled ? '0.4' : '1'; }

    sel.innerHTML = `<option value="">Winner</option>` +
      teams.map(tm=>`<option value="${tm}"${tm===cur?' selected':''}>${tm}</option>`).join('');

    if (cur && !teams.includes(cur)) sel.value = '';

    const slot = document.getElementById(`slot_${rid}_${sid}`);
    if (slot) {
      const lbl = slot.querySelector('.slot-teams');
      if (lbl) {
        if (teams.length === 2) { lbl.style.fontStyle=''; lbl.style.color=''; lbl.innerHTML=`<strong>${teams[0]}</strong> vs <strong>${teams[1]}</strong>`; }
        else if (teams.length === 1) { lbl.style.fontStyle='italic'; lbl.style.color='var(--text2)'; lbl.textContent=`${teams[0]} vs (pick other team)`; }
        else { lbl.style.fontStyle='italic'; lbl.style.color='var(--text2)'; lbl.textContent='Pick previous round first'; }
      }
    }
  }

  updateSlot('r2','r2_s1', t.wr2s1);
  updateSlot('r2','r2_s2', t.wr2s2);
  updateSlot('r2','r2_s3', t.er2s3);
  updateSlot('r2','r2_s4', t.er2s4);
  updateSlot('r3','r3_s1', t.wcf);
  updateSlot('r3','r3_s2', t.ecf);
  updateSlot('r4','r4_s1', t.final);

  // Cascade to mobile too if present
  refreshMobileCascade();
}

function getMatchupsForRound(ri) {
  if (ri === 0) return R1_MATCHUPS;
  const count = ROUNDS[ri].series_count;
  const series = [];
  for (let i = 0; i < count; i++) {
    series.push({ id: `r${ri+1}_s${i+1}`, teams: ALL_TEAMS, a: '', b: '' });
  }
  return series;
}

      <div style="font-size:32px;margin-bottom:.75rem">🔒</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);margin-bottom:.5rem">Picks Not Locked Yet</div>
      <div style="font-size:14px;color:var(--text2)">Everyone's bracket will appear here once Round 1 locks. No peeking before then.</div>
    </div>`;
  }
  const scores = computeScores();
  if (allEntries.length === 0) return `<div class="card"><div style="color:var(--text2)">No picks submitted yet.</div></div>`;

  const sorted = [...allEntries].sort((a,b) => (scores[b.id]||0) - (scores[a.id]||0));

  // All series in order — West left, East right (matches bracket layout)
  const SERIES = [
    {rid:'r1',sid:'w1',label:'R1 W-1'}, {rid:'r1',sid:'w2',label:'R1 W-2'},
    {rid:'r1',sid:'w3',label:'R1 W-3'}, {rid:'r1',sid:'w4',label:'R1 W-4'},
    {rid:'r2',sid:'r2_s1',label:'R2 W-1'}, {rid:'r2',sid:'r2_s2',label:'R2 W-2'},
    {rid:'r3',sid:'r3_s1',label:'WCF'},
    {rid:'r4',sid:'r4_s1',label:'Cup Final'},
    {rid:'r3',sid:'r3_s2',label:'ECF'},
    {rid:'r2',sid:'r2_s3',label:'R2 E-1'}, {rid:'r2',sid:'r2_s4',label:'R2 E-2'},
    {rid:'r1',sid:'e1',label:'R1 E-1'}, {rid:'r1',sid:'e2',label:'R1 E-2'},
    {rid:'r1',sid:'e3',label:'R1 E-3'}, {rid:'r1',sid:'e4',label:'R1 E-4'},
  ];

  // Group headers match bracket order
  const groups = [
    {label:'Round 1 — West', cols:4},
    {label:'Round 2 — West', cols:2},
    {label:'WCF', cols:1},
    {label:'🏆 Final', cols:1},
    {label:'ECF', cols:1},
    {label:'Round 2 — East', cols:2},
    {label:'Round 1 — East', cols:4},
  ];

  function pickStyle(rid, sid, winner) {
    const res = results[rid]?.[sid];
    if (!res?.winner) return '';
    if (winner === res.winner) return 'color:var(--green);font-weight:600';
    return 'color:var(--red)';
  }

  let html = `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:900px">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--gold2);font-weight:600;white-space:nowrap">Player</th>
          <th style="padding:6px 4px;border-bottom:1px solid var(--border);color:var(--gold2);text-align:right;white-space:nowrap">Pts</th>`;

  groups.forEach(g => {
    html += `<th colspan="${g.cols}" style="padding:6px 8px;border-bottom:1px solid var(--border);border-left:1px solid var(--border2);color:var(--text2);font-size:11px;letter-spacing:1px;text-align:center">${g.label}</th>`;
  });
  html += `</tr><tr><th></th><th></th>`;

  // Series sub-headers with actual matchup labels
  SERIES.forEach((s, i) => {
    const borderLeft = [0,4,6,7,8,10,11].includes(i) ? 'border-left:1px solid var(--border2);' : '';
    let matchLabel = s.label;
    if (s.rid === 'r1') {
      const m = R1_MATCHUPS.find(m => m.id === s.sid);
      if (m) matchLabel = `${m.a.split(' ').pop()} vs ${m.b.split(' ').pop()}`;
    }
    html += `<th style="padding:5px 4px;border-bottom:1px solid var(--border);color:var(--text2);font-size:10px;text-align:center;${borderLeft}white-space:nowrap">${matchLabel}</th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((entry, idx) => {
    const owner = profiles[entry.user_id];
    const name = owner?.username || '?';
    const multiEntry = allEntries.filter(e => e.user_id === entry.user_id).length > 1;
    const displayName = multiEntry ? `${name} <span style="color:var(--text2);font-size:10px">${entry.name}</span>` : name;
    const pts = scores[entry.id] || 0;
    const tb = tiebreakers[entry.id] ? ` <span style="color:var(--text2);font-size:10px">(TB:${tiebreakers[entry.id]})</span>` : '';
    const bg = idx % 2 === 0 ? 'background:rgba(255,255,255,0.02)' : '';
    html += `<tr style="${bg}">
      <td style="padding:8px 10px;font-weight:500;white-space:nowrap">${displayName}${tb}</td>
      <td style="padding:8px 6px;text-align:right;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold2)">${pts}</td>`;

    SERIES.forEach((s, i) => {
      const pick = allPicks[entry.id]?.[s.rid]?.[s.sid] || {};
      const borderLeft = [0,4,6,7,8,10,11].includes(i) ? 'border-left:1px solid var(--border2);' : '';
      const style = pickStyle(s.rid, s.sid, pick.winner);
      const shortName = pick.winner ? pick.winner.split(' ').pop() : '—';
      const games = pick.games ? ` (${pick.games})` : '';
      html += `<td style="padding:6px 4px;text-align:center;${borderLeft}${style}" title="${pick.winner||''}${games}">${shortName}${games}</td>`;
    });
    html += `</tr>`;
  });

  // Results row
  html += `<tr style="border-top:2px solid var(--border)">
    <td style="padding:8px 10px;color:var(--gold2);font-weight:600;font-size:12px">RESULTS</td>
    <td></td>`;
  SERIES.forEach((s, i) => {
    const res = results[s.rid]?.[s.sid];
    const borderLeft = [0,4,6,7,8,10,11].includes(i) ? 'border-left:1px solid var(--border2);' : '';
    const short = res?.winner ? res.winner.split(' ').pop() : '—';
    const games = res?.games ? ` (${res.games})` : '';
    html += `<td style="padding:6px 4px;text-align:center;${borderLeft}color:var(--gold2);font-weight:600;font-size:11px">${short}${games}</td>`;
  });
  html += `</tr></tbody></table></div>`;

  return `<div class="card" style="padding:1rem">${html}</div>`;
}

function attachLogin() {
  document.getElementById('l_submit').onclick = handleLogin;
  document.getElementById('l_toggle').onclick = () => { regMode = !regMode; loginError = ''; render(); };
  document.querySelectorAll('input[type="text"], input[type="password"]').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('l_submit').click(); }));
  const checkbox = document.getElementById('case_ack');
  const submitBtn = document.getElementById('l_submit');
  if (checkbox && submitBtn) {
    checkbox.addEventListener('change', () => {
      submitBtn.disabled = !checkbox.checked;
      submitBtn.style.opacity = checkbox.checked ? '1' : '0.5';
      submitBtn.style.pointerEvents = checkbox.checked ? 'auto' : 'none';
    });
  }
}

async function handleLogin() {
  const username = document.getElementById('l_user').value.trim().toLowerCase();
  const pass = document.getElementById('l_pass').value;
  if (!username || !pass) { loginError = 'Please fill in all fields.'; render(); return; }
  const email = username + '@stanleycuppool.local';
  if (regMode) {
    const pass2 = document.getElementById('l_pass2').value;
    if (pass !== pass2) { loginError = "Passwords don't match."; render(); return; }
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { loginError = error.message; render(); return; }
    if (data.user) {
      await sb.from('profiles').upsert({ id: data.user.id, username, is_admin: false });
    }
  } else {
    // Check for admin-set temp password first
    const { data: profileData } = await sb.from('profiles').select('temp_password').eq('username', username).single();
    if (profileData?.temp_password && pass === profileData.temp_password) {
      // Temp password matched — sign in with it then force password update
      const { data, error } = await sb.auth.signInWithPassword({ email, password: profileData.temp_password });
      if (error) { loginError = 'Invalid username or password.'; render(); return; }
      // Update their real Supabase auth password and clear temp
      await sb.auth.updateUser({ password: profileData.temp_password });
      await sb.from('profiles').update({ temp_password: null }).eq('username', username);
      return;
    }
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { loginError = 'Invalid username or password.'; render(); return; }
  }
}

  document.getElementById('logout_btn').onclick = () => sb.auth.signOut();
  document.querySelectorAll('.tab').forEach(t => {

  document.querySelectorAll('.entry-tab').forEach(btn => {

  });

    addEntryBtn.onclick = async () => {
      const entries = myEntries();
      const name = `Entry ${entries.length + 1}`;

      });

        const w = document.getElementById(`rw_${rid}_${m.id}`)?.value;
        const g = document.getElementById(`rg_${rid}_${m.id}`)?.value;
        if (w) upserts.push({ round_id: rid, series_id: m.id, winner: w, games: g || null });
      });
      if (upserts.length > 0) {
        await sb.from('results').upsert(upserts, { onConflict: 'round_id,series_id' });
      }
      await refreshData();
      saveMsg = 'Results saved!';
      render();
    };
  });

  const savetbBtn = document.querySelector('[data-action="savetb"]');
  if (savetbBtn) savetbBtn.onclick = async () => {
    const v = document.getElementById('tb_actual')?.value;
    if (v) await sb.from('tiebreakers').upsert({ user_id: '__result__', goals: parseInt(v) }, { onConflict: 'user_id' });
    await refreshData();
    saveMsg = 'Tiebreaker result saved!';
    render();
  };

  // Reset password
  document.querySelectorAll('[data-action="resetpw"]').forEach(btn => {
    btn.onclick = async () => {
      const uid = btn.dataset.uid;
      const username = btn.dataset.username;
      const newpw = document.getElementById(`newpw_${uid}`)?.value?.trim();
      const msgEl = document.getElementById(`pwmsg_${uid}`);
      if (!newpw || newpw.length < 6) {
        if (msgEl) { msgEl.textContent = 'Min 6 chars'; msgEl.style.color = 'var(--red)'; }
        return;
      }
      // Use Supabase admin API via edge function isn't available on client —
      // instead we update the email/password by signing in as the user isn't possible client-side.
      // Best approach: store a password_reset flag and temp password in profiles table,
      // player sees a prompt to change it on next login.
      const { error } = await sb.from('profiles').update({ temp_password: newpw }).eq('id', uid);
      if (error) {
        if (msgEl) { msgEl.textContent = 'Error'; msgEl.style.color = 'var(--red)'; }
        return;
      }
      if (msgEl) { msgEl.textContent = 'Saved'; msgEl.style.color = 'var(--green)'; }
      document.getElementById(`newpw_${uid}`).value = '';
      setTimeout(() => { if (msgEl) msgEl.textContent = ''; }, 3000);
    };
  });
}

function toggleMobileRound(header) {
  const chevron = header.querySelector('.mobile-round-chevron');
  const body = header.nextElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

function syncMobilePick(rid, sid) {
  // Keep desktop and mobile selects in sync, then cascade
  const mobileWin = document.getElementById(`mpw_${rid}_${sid}`)?.value;
  const desktopWin = document.getElementById(`pw_${rid}_${sid}`);
  if (desktopWin && mobileWin !== undefined) desktopWin.value = mobileWin;
  refreshBracket();
  // Also update mobile downstream slots after cascade
  refreshMobileCascade();
}

function refreshMobileCascade() {
  const t = getCascadedTeams();
  const updates = [
    ['r2','r2_s1', t.wr2s1], ['r2','r2_s2', t.wr2s2],
    ['r2','r2_s3', t.er2s3], ['r2','r2_s4', t.er2s4],
    ['r3','r3_s1', t.wcf],   ['r3','r3_s2', t.ecf],
    ['r4','r4_s1', t.final],
  ];
  updates.forEach(([rid, sid, teams]) => {
    const sel = document.getElementById(`mpw_${rid}_${sid}`);
    if (!sel) return;
    const cur = sel.value;
    const disabled = teams.length === 0;
    sel.disabled = disabled;
    sel.style.opacity = disabled ? '0.45' : '1';
    const gsel = document.getElementById(`mpg_${rid}_${sid}`);
    if (gsel) { gsel.disabled = disabled; gsel.style.opacity = disabled ? '0.45' : '1'; }
    sel.innerHTML = `<option value="">Pick winner</option>` +
      teams.map(tm=>`<option value="${tm}"${tm===cur?' selected':''}>${tm}</option>`).join('');
    if (cur && !teams.includes(cur)) sel.value = '';
    const slot = document.getElementById(`mslot_${rid}_${sid}`);
    if (slot) {
      const lbl = slot.querySelector('.mobile-slot-teams');
      if (lbl) {
        if (teams.length === 2) { lbl.style.fontStyle=''; lbl.style.color=''; lbl.textContent=`${teams[0]} vs ${teams[1]}`; }
        else if (teams.length === 1) { lbl.style.fontStyle='italic'; lbl.style.color='var(--text2)'; lbl.textContent=`${teams[0]} vs (pick other team)`; }
        else { lbl.style.fontStyle='italic'; lbl.style.color='var(--text2)'; lbl.textContent='Pick previous round first'; }
      }
    }
  });
}

boot();
</script>
